<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pari ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
padding:20px;
}

.container{
text-align:center;
max-width:450px;
width:100%;
}

.pari-photo{
width:220px;
height:220px;
border-radius:50%;
object-fit:cover;
border:6px solid white;
box-shadow:0 0 25px rgba(255,255,255,.8);
margin-bottom:20px;
}

h1{
color:white;
margin-bottom:20px;
line-height:1.3;
}

button{
border:none;
cursor:pointer;
border-radius:40px;
padding:14px 28px;
font-size:18px;
transition:.3s;
}

#yesBtn{
background:#28a745;
color:white;
}

#noBtn{
background:#dc3545;
color:white;
position:absolute;
}

.hidden{
display:none;
}

.choice-btn{
display:block;
width:250px;
margin:12px auto;
background:white;
}

#datePicker{
padding:12px;
font-size:18px;
border-radius:10px;
border:none;
margin-top:15px;
}

#sendBtn{
background:#25D366;
color:white;
margin-top:20px;
}

.heart{
position:fixed;
font-size:24px;
pointer-events:none;
animation:floatUp 5s linear forwards;
}

@keyframes floatUp{
from{
transform:translateY(0);
opacity:1;
}
to{
transform:translateY(-110vh);
opacity:0;
}
}

@media(max-width:600px){

.pari-photo{
width:180px;
height:180px;
}

h1{
font-size:28px;
}

button{
font-size:16px;
}

}

</style>
</head>

<body>

<div class="container" id="page1">

<img src="pari.jpg" class="pari-photo">

<h1>
Pari, will you go on a date with me? ❤️
</h1>

<div style="height:160px;position:relative;">

<button id="yesBtn">
YES ❤️
</button>

<button id="noBtn">
NO 😅
</button>

</div>

<div id="msg"
style="color:white;font-size:22px;font-weight:bold;">
</div>

</div>

<div class="container hidden" id="page2">

<h1>Yayyyyy! ❤️🥳</h1>

<h2 style="color:white;margin-bottom:20px;">
Choose our date
</h2>

<button class="choice-btn"
onclick="selectPlan('Coffee Date ☕')">
☕ Coffee Date
</button>

<button class="choice-btn"
onclick="selectPlan('Movie Date 🎬')">
🎬 Movie Date
</button>

<button class="choice-btn"
onclick="selectPlan('Pizza Date 🍕')">
🍕 Pizza Date
</button>

<button class="choice-btn"
onclick="selectPlan('Evening Walk 🌳')">
🌳 Evening Walk
</button>

<div id="calendarSection" class="hidden">

<h2 style="color:white;margin-top:20px;">
Select Date ❤️
</h2>

<input
type="date"
id="datePicker">

<br>

<button id="sendBtn"
onclick="sendWhatsapp()">
Send My Answer ❤️
</button>

</div>

</div>

<script>

const noBtn=document.getElementById("noBtn");
const yesBtn=document.getElementById("yesBtn");
const msg=document.getElementById("msg");

const texts=[
"Are you sure? 🥺",
"Think again 😭",
"Pretty please ❤️",
"Come on Pari 😍",
"My heart already said YES 💘",
"One more chance 😅"
];

let count=0;

noBtn.addEventListener("mouseover",()=>{

count++;

if(count<=texts.length){
msg.innerText=texts[count-1];
}

const x=Math.random()*(window.innerWidth-150);
const y=Math.random()*(window.innerHeight-150);

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

yesBtn.style.transform=
`scale(${1+count*0.1})`;

});

yesBtn.addEventListener("click",()=>{

document.getElementById("page1")
.classList.add("hidden");

document.getElementById("page2")
.classList.remove("hidden");

launchHearts();

});

let selectedPlan="";

function selectPlan(plan){

selectedPlan=plan;

document.getElementById(
"calendarSection"
).classList.remove("hidden");

}

function sendWhatsapp(){

const date=
document.getElementById(
"datePicker"
).value;

if(!date){
alert("Please select a date ❤️");
return;
}

const message=
`Hi Pardeep ❤️

I'd love to go on a date with you.

Date Plan: ${selectedPlan}

Let's meet on ${date} ❤️`;

const url=
`https://wa.me/917814499077?text=${encodeURIComponent(message)}`;

window.open(url,"_blank");

}

function launchHearts(){

setInterval(()=>{

const heart=
document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=
Math.random()*100+"vw";

heart.style.top="100vh";

document.body.appendChild(
heart
);

setTimeout(()=>{
heart.remove();
},5000);

},300);

}

</script>

</body>
</html>
