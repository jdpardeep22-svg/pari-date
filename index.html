<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pari ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
}

.container{
text-align:center;
padding:20px;
}

h1{
font-size:3rem;
color:white;
margin-bottom:30px;
text-shadow:2px 2px 10px rgba(0,0,0,0.2);
}

.buttons{
position:relative;
height:200px;
}

button{
padding:15px 35px;
font-size:1.2rem;
border:none;
border-radius:50px;
cursor:pointer;
transition:0.3s;
}

#yesBtn{
background:#28a745;
color:white;
margin-right:20px;
}

#noBtn{
background:#dc3545;
color:white;
position:absolute;
}

#message{
font-size:2rem;
color:white;
margin-top:30px;
font-weight:bold;
}

.hidden{
display:none;
}

.choice-btn{
display:block;
margin:10px auto;
width:220px;
}
</style>
</head>

<body>

<div class="container" id="page1">
<h1>Pari, will you go on a date with me? ❤️</h1>

<div class="buttons">
<button id="yesBtn">YES ❤️</button>
<button id="noBtn">NO 😅</button>
</div>

<div id="message"></div>
</div>

<div class="container hidden" id="page2">
<h1>Yayyyyy! ❤️🥳</h1>
<p style="font-size:1.5rem;color:white;margin-bottom:20px;">
Choose our date:
</p>

<button class="choice-btn">☕ Coffee Date</button>
<button class="choice-btn">🎬 Movie Date</button>
<button class="choice-btn">🍕 Pizza Date</button>
<button class="choice-btn">🌳 Evening Walk</button>

<div id="finalMsg" style="margin-top:30px;font-size:2rem;color:white;"></div>
</div>

<script>

const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const message = document.getElementById("message");

let count = 0;

const texts = [
"Are you sure? 🥺",
"Think again 😭",
"Pretty please? ❤️",
"Come on Pari 😍",
"My heart already said YES 💘",
"Last chance 😅"
];

noBtn.addEventListener("mouseover", () => {

count++;

if(count <= texts.length){
message.innerText = texts[count-1];
}

const x = Math.random() * (window.innerWidth - 150);
const y = Math.random() * (window.innerHeight - 100);

noBtn.style.left = x + "px";
noBtn.style.top = y + "px";

let size = 1 + count * 0.1;
yesBtn.style.transform = `scale(${size})`;
});

yesBtn.addEventListener("click", () => {

document.getElementById("page1").classList.add("hidden");
document.getElementById("page2").classList.remove("hidden");

createHearts();
});

document.querySelectorAll(".choice-btn").forEach(btn=>{
btn.addEventListener("click",()=>{
document.getElementById("finalMsg").innerHTML =
"❤️ I can't wait to see you, Pari! ❤️";
});
});

function createHearts(){

setInterval(()=>{

const heart = document.createElement("div");

heart.innerHTML="❤️";

heart.style.position="absolute";
heart.style.left=Math.random()*100+"vw";
heart.style.top="100vh";
heart.style.fontSize=(20+Math.random()*30)+"px";

document.body.appendChild(heart);

heart.animate([
{transform:"translateY(0px)"},
{transform:"translateY(-120vh)"}
],{
duration:4000
});

setTimeout(()=>{
heart.remove();
},4000);

},250);
}

</script>

</body>
</html>
